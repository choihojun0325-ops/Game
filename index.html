<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game - Linked List</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #222;
            font-family: Arial, sans-serif;
            color: white;
        }
        
        .container {
            text-align: center;
        }
        
        h1 {
            margin-bottom: 10px;
        }
        
        .info {
            margin-bottom: 20px;
            font-size: 14px;
            color: #aaa;
        }
        
        canvas {
            border: 2px solid #fff;
            background-color: #000;
            display: block;
            margin: 20px auto;
        }
        
        .controls {
            margin: 20px 0;
        }
        
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
        
        button:hover {
            background-color: #45a049;
        }
        
        #score {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Snake Game</h1>
        <p class="info">Linked List Implementation</p>
        <div id="score">Score: 0</div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <button id="startBtn">Start Game</button>
            <button id="resetBtn">Reset</button>
        </div>
    </div>

    <script>
        // Linked List Node
        class SnakeNode {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.next = null;
            }
        }

        // Linked List for Snake
        class SnakeList {
            constructor() {
                this.head = null;
                this.tail = null;
                this.length = 0;
            }

            addHead(x, y) {
                const newNode = new SnakeNode(x, y);
                if (this.length === 0) {
                    this.head = newNode;
                    this.tail = newNode;
                } else {
                    newNode.next = this.head;
                    this.head = newNode;
                }
                this.length++;
            }

            removeTail() {
                if (this.length === 0) return;
                if (this.length === 1) {
                    this.head = null;
                    this.tail = null;
                } else {
                    let current = this.head;
                    while (current.next !== this.tail) {
                        current = current.next;
                    }
                    current.next = null;
                    this.tail = current;
                }
                this.length--;
            }

            getAll() {
                const segments = [];
                let current = this.head;
                while (current) {
                    segments.push({ x: current.x, y: current.y });
                    current = current.next;
                }
                return segments;
            }

            checkCollision(x, y) {
                let current = this.head;
                while (current) {
                    if (current.x === x && current.y === y) return true;
                    current = current.next;
                }
                return false;
            }

            reset() {
                this.head = null;
                this.tail = null;
                this.length = 0;
            }
        }

        // Game Variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = new SnakeList();
        let food = { x: 10, y: 10 };
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let gameRunning = false;
        let gameSpeed = 100;

        // Initialize game
        function initGame() {
            snake.reset();
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameSpeed = 100;

            // Create initial snake
            snake.addHead(10, 10);
            snake.addHead(9, 10);
            snake.addHead(8, 10);

            generateFood();
            updateScore();
        }

        function generateFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.checkCollision(newFood.x, newFood.y));
            food = newFood;
        }

        function updateScore() {
            document.getElementById('score').textContent = `Score: ${score}`;
        }

        function update() {
            direction = nextDirection;

            const head = snake.head;
            const newX = head.x + direction.x;
            const newY = head.y + direction.y;

            // Wall collision
            if (newX < 0 || newX >= tileCount || newY < 0 || newY >= tileCount) {
                endGame();
                return;
            }

            // Self collision
            if (snake.checkCollision(newX, newY)) {
                endGame();
                return;
            }

            snake.addHead(newX, newY);

            // Food collision
            if (newX === food.x && newY === food.y) {
                score += 10;
                gameSpeed = Math.max(50, 100 - Math.floor(score / 50));
                updateScore();
                generateFood();
            } else {
                snake.removeTail();
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw snake
            const segments = snake.getAll();
            segments.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#00FF00' : '#00AA00';
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 1, gridSize - 1);
            });

            // Draw food
            ctx.fillStyle = '#FF0000';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 1, gridSize - 1);
        }

        function gameLoop() {
            update();
            draw();
            if (gameRunning) {
                setTimeout(gameLoop, gameSpeed);
            }
        }

        function endGame() {
            gameRunning = false;
            alert(`Game Over! Final Score: ${score}`);
            document.getElementById('startBtn').textContent = 'Start Game';
        }

        // Event Listeners
        document.getElementById('startBtn').addEventListener('click', () => {
            if (!gameRunning) {
                initGame();
                gameRunning = true;
                document.getElementById('startBtn').textContent = 'Playing...';
                gameLoop();
            }
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            gameRunning = false;
            snake.reset();
            score = 0;
            updateScore();
            document.getElementById('startBtn').textContent = 'Start Game';
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        });

        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;

            switch (e.key) {
                case 'ArrowUp':
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    e.preventDefault();
                    break;
            }
        });

        // Initial draw
        initGame();
        draw();
    </script>
</body>
</html>
