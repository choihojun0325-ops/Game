<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        canvas {
            border: 1px solid black;
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <script>
        class SnakeNode {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.next = null;
            }
        }

        class SnakeList {
            constructor() {
                this.head = null;
                this.tail = null;
                this.length = 0;
            }

            addSegment(x, y) {
                const newNode = new SnakeNode(x, y);
                if (!this.head) {
                    this.head = newNode;
                    this.tail = newNode;
                } else {
                    newNode.next = this.head;
                    this.head = newNode;
                }
                this.length++;
            }

            removeTail() {
                if (this.length === 0) return;
                if (this.length === 1) {
                    this.head = null;
                    this.tail = null;
                } else {
                    let current = this.head;
                    while (current.next !== this.tail) {
                        current = current.next;
                    }
                    current.next = null;
                    this.tail = current;
                }
                this.length--;
            }

            addHead(x, y) {
                this.addSegment(x, y);
            }

            checkCollision(x, y) {
                let current = this.head;
                while (current) {
                    if (current.x === x && current.y === y) return true;
                    current = current.next;
                }
                return false;
            }
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const snake = new SnakeList();
        let snakeDirection = { x: 0, y: 0 };
        let gameInterval;
        let food = { x: 0, y: 0 };

        function initGame() {
            snake.addSegment(200, 200);
            spawnFood();
            document.addEventListener('keydown', changeDirection);
            gameInterval = setInterval(gameLoop, 100);
        }

        function spawnFood() {
            food.x = Math.floor(Math.random() * (canvas.width / 10)) * 10;
            food.y = Math.floor(Math.random() * (canvas.height / 10)) * 10;
        }

        function changeDirection(event) {
            switch (event.key) {
                case 'ArrowUp':
                    snakeDirection = { x: 0, y: -10 };
                    break;
                case 'ArrowDown':
                    snakeDirection = { x: 0, y: 10 };
                    break;
                case 'ArrowLeft':
                    snakeDirection = { x: -10, y: 0 };
                    break;
                case 'ArrowRight':
                    snakeDirection = { x: 10, y: 0 };
                    break;
            }
        }

        function gameLoop() {
            const headX = snake.head ? snake.head.x : 0;
            const headY = snake.head ? snake.head.y : 0;
            const newHeadX = headX + snakeDirection.x;
            const newHeadY = headY + snakeDirection.y;

            if (snake.checkCollision(newHeadX, newHeadY) || newHeadX < 0 || newHeadX >= canvas.width || newHeadY < 0 || newHeadY >= canvas.height) {
                clearInterval(gameInterval);
                alert('Game Over!');
                return;
            }

            snake.addHead(newHeadX, newHeadY);
            if (newHeadX === food.x && newHeadY === food.y) {
                spawnFood();
            } else {
                snake.removeTail();
            }
            drawGame();
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'green';
            let current = snake.head;
            while (current) {
                ctx.fillRect(current.x, current.y, 10, 10);
                current = current.next;
            }
            ctx.fillStyle = 'red';
            ctx.fillRect(food.x, food.y, 10, 10);
        }

        initGame();
    </script>
</body>
</html>
